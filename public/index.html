<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=5, viewport-fit=cover" />
  <meta name="theme-color" content="#7C9EF5" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ゴミカル" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <title>ゴミカル</title>
  <style>
    html, body, #root {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    /* Ensure Expo Router / React Navigation wrapper divs propagate full height */
    #root {
      display: flex;
      flex-direction: column;
    }
    #root > div {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }
    /* Prevent pull-to-refresh on mobile web */
    body { overscroll-behavior-y: none; }
    /* Reset default input styles for RNW */
    input, textarea { outline: none; }
  </style>
  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
